<!DOCTYPE html>

<html>
<head>
    <title>Update Student</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="main">

```
<div class="header">
    <h1>👨‍🎓 Update Student Details</h1>
    <p>Edit Student Information</p>
</div>

<div class="form-box">

    <form method="POST">

        <label>Student Name</label>
        <input type="text" name="name" value="{{ student[1] }}" required>

        <label>Department ID</label>
        <input type="number" name="department_id" value="{{ student[2] }}" required>

        <label>Year</label>
        <input type="number" name="year" value="{{ student[3] }}" required>

        <label>Email Address</label>
        <input type="email" name="email" value="{{ student[4] }}" required>

        <button type="submit">Update Student</button>

    </form>

    <br>

    <a href="/students" class="back-btn">⬅ Back</a>

</div>
```

</div>

</body>
</html>
