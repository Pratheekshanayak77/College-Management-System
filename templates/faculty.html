    <!DOCTYPE html>

<head>
    <title>Faculty</title>

<div class="main">

```
<div class="header">
    <h1>👩‍🏫 Faculty Management</h1>
    <p>View all faculty records</p>
</div>

<div class="table-box">

    <h2>Faculty Records</h2>

    <table>

        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Department</th>
            <th>Designation</th>
            <th>Actions</th>
        </tr>

        {% for f in faculty %}
        <tr>
            <td>{{ f[0] }}</td>
            <td>{{ f[1] }}</td>
            <td>{{ f[2] }}</td>
            <td>{{ f[3] }}</td>

            <td>

                <a
                href="/update_faculty/{{ f[0] }}"
                class="update-btn"
                onclick="alert('Faculty Updated Successfully')">
                Update
                </a>

                <a
                href="/delete_faculty/{{ f[0] }}"
                class="delete-btn"
                onclick="return confirm('Delete this faculty record?')">
                Delete
                </a>

            </td>

        </tr>
        {% endfor %}

    </table>

    <br>

    <a href="/" class="back-btn">⬅ Back to Dashboard</a>

</div>
```

</div>
