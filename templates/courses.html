<div class="main">

```
<div class="header">
    <h1>📚 Course Management</h1>
    <p>View all course records</p>
</div>

<div class="table-box">

    <h2>Course Records</h2>

    <table>

        <tr>
            <th>Course ID</th>
            <th>Course Name</th>
            <th>Credits</th>
            <th>Department</th>
            <th>Actions</th>
        </tr>

        {% for c in courses %}
        <tr>

            <td>{{ c[0] }}</td>
            <td>{{ c[1] }}</td>
            <td>{{ c[2] }}</td>
            <td>{{ c[3] }}</td>

            <td>

                <a
                href="/update_course/{{ c[0] }}"
                class="update-btn"
                onclick="alert('Course Updated Successfully')">
                Update
                </a>

                <a
                href="/delete_course/{{ c[0] }}"
                class="delete-btn"
                onclick="return confirm('Delete this course?')">
                Delete
                </a>

            </td>

        </tr>
        {% endfor %}

    </table>

    <br>

    <a href="/" class="back-btn">⬅ Back to Dashboard</a>

</div>
```

</div>
